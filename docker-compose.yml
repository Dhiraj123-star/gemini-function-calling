services:
  ai-agent:
    build: .
    container_name: gemini-ai-agent
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    volumes:
      - .:/app
      - sqlite_data:/app
    depends_on:
      - redis
    restart: always
  
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6380:6379"
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ai-agent
    restart: always

volumes:
  sqlite_data:
  caddy_data:
  caddy_config: