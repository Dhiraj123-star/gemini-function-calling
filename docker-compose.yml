services:
  ai-agent:
    build: .
    container_name: gemini-ai-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    volumes:
      - .:/app
      - sqlite_data:/app
    depends_on:
      - redis
    restart: always
  
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6380:6379"
    restart: always

volumes:
  sqlite_data: